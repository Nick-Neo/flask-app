name: Build and Deploy Portfolio to AKS

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      ACR_NAME: myportfolioacr
      IMAGE_NAME: portfolio
      RESOURCE_GROUP: portfolio
      AKS_CLUSTER: portfolio
      IMAGE_TAG: v${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: python3 -m py_compile flask_app.py

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and Push Docker Image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/portfolio \
            portfolio=$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG \
            -n portfolio

          kubectl rollout status deployment/portfolio -n portfolio

      - name: Create Git Tag
        run: |
          git tag $IMAGE_TAG
          git push origin $IMAGE_TAG