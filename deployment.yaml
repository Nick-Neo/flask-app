apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaskapp-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flaskapp
  template:
    metadata:
      labels:
        app: flaskapp
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: flaskapp
          image: nickneo23/flaskapp:v1.1
          ports:
            - containerPort: 5000